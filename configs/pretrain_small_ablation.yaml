seed: 1337
out_dir: outputs/checkpoints/pretrain_small
log_path: outputs/logs/pretrain_small_metrics.csv
tokenizer_path: outputs/tokenizer/tokenizer.json
data:
  train_bin: data/tinystories/train.bin
  val_bin: data/tinystories/val.bin
  meta_path: data/tinystories/meta.json
model:
  n_layer: 4
  n_embd: 384
  n_head: 6
  block_size: 512
  dropout: 0.1
learning_rate: 0.0003
weight_decay: 0.1
warmup_steps: 500
max_steps: 10000
eval_interval: 500
eval_iters: 50
per_device_batch_size: 12
eval_batch_size: 12
grad_accum_steps: 4
grad_clip: 1.0
fp16: true
