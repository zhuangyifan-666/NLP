seed: 1337
synthetic: false
tokenizer_path: outputs/tokenizer/tokenizer.json
pretrained: outputs/checkpoints/pretrain/best.pt
out_dir: outputs/checkpoints/sft_lora
log_path: outputs/logs/sft_lora_metrics.csv
data:
  dataset: yahma/alpaca-cleaned
  split: train
  max_samples: 10000
max_length: 512
train_last_n_layers: 0
learning_rate: 0.0002
weight_decay: 0.01
warmup_steps: 200
max_steps: 4000
eval_interval: 250
eval_iters: 30
per_device_batch_size: 8
eval_batch_size: 8
grad_accum_steps: 4
grad_clip: 1.0
fp16: true
lora:
  enabled: true
  note: "LoRA ablation: freeze the base model and train attention projection adapters only."
  rank: 8
  alpha: 16
  dropout: 0.05
  train_lm_head: false
  train_layer_norm: false
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - out_proj
