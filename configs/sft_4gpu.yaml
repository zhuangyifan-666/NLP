seed: 1337
synthetic: false
tokenizer_path: outputs/tokenizer/tokenizer.json
pretrained: outputs/checkpoints/pretrain/best.pt
out_dir: outputs/checkpoints/sft
log_path: outputs/logs/sft_metrics.csv
data:
  dataset: yahma/alpaca-cleaned
  split: train
  max_samples: 5000
max_length: 512
train_last_n_layers: 2
learning_rate: 0.0001
weight_decay: 0.01
warmup_steps: 100
max_steps: 2000
eval_interval: 200
eval_iters: 20
per_device_batch_size: 8
eval_batch_size: 8
grad_accum_steps: 4
grad_clip: 1.0
fp16: true

