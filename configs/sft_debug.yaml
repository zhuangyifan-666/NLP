seed: 1337
synthetic: true
tokenizer_path: outputs/tokenizer/tokenizer.json
pretrained: null
out_dir: outputs/checkpoints/sft
log_path: outputs/logs/sft_metrics.csv
data:
  dataset: yahma/alpaca-cleaned
  split: train
  max_samples: 64
model:
  n_layer: 2
  n_embd: 64
  n_head: 2
  block_size: 128
  dropout: 0.1
max_length: 64
train_last_n_layers: 2
learning_rate: 0.0001
weight_decay: 0.01
warmup_steps: 2
max_steps: 10
eval_interval: 5
eval_iters: 2
per_device_batch_size: 2
eval_batch_size: 2
grad_accum_steps: 1
grad_clip: 1.0
fp16: true
